<!doctype html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}telegram-news{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --pico-font-size: 15px;
      --pico-spacing: 0.9rem;
      --pico-border-radius: 0.4rem;
    }
    body { font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11'; }
    main.container, nav.container { max-width: 1080px; }

    /* Tighter top nav */
    nav.app-nav {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--pico-muted-border-color);
      margin-bottom: 1.5rem;
    }
    nav.app-nav a { text-decoration: none; }
    nav.app-nav .brand { font-weight: 600; letter-spacing: -0.01em; }
    nav.app-nav .brand .dim { color: var(--pico-muted-color); font-weight: 400; }
    nav.app-nav .nav-link {
      padding: 0.3rem 0.6rem;
      border-radius: var(--pico-border-radius);
      color: var(--pico-color);
    }
    nav.app-nav .nav-link:hover { background: var(--pico-secondary-background); }
    nav.app-nav .nav-link.active {
      background: var(--pico-primary-background);
      color: var(--pico-primary-inverse);
    }

    /* Section headers */
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
    }
    .section-head h2 {
      font-size: 1.25rem;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .section-head .subtitle {
      color: var(--pico-muted-color);
      font-size: 0.85rem;
      margin-top: 0.2rem;
    }

    /* Compact buttons in row actions */
    .row-actions { display: inline-flex; gap: 0.35rem; align-items: center; }
    .row-actions form { margin: 0; display: inline; }
    .btn-mini {
      --pico-form-element-spacing-vertical: 0.25rem;
      --pico-form-element-spacing-horizontal: 0.6rem;
      font-size: 0.85rem;
      margin: 0;
      white-space: nowrap;
    }

    /* Compact table */
    table { font-size: 0.92rem; }
    table th { font-weight: 600; color: var(--pico-muted-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
    table td { vertical-align: middle; }

    /* Channel badges */
    .channel-badge {
      display: inline-block;
      background: var(--pico-secondary-background);
      color: var(--pico-secondary);
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      font-size: 0.78rem;
      margin: 0.1rem 0.15rem 0.1rem 0;
      font-family: var(--pico-font-family-monospace);
    }

    /* Schedule/target/token mono */
    .schedule-cell {
      font-family: var(--pico-font-family-monospace);
      font-size: 0.85rem;
      color: var(--pico-muted-color);
    }
    .target-mono {
      font-family: var(--pico-font-family-monospace);
      font-size: 0.88rem;
    }
    .token-mask {
      font-family: var(--pico-font-family-monospace);
      letter-spacing: 0.06em;
      color: var(--pico-muted-color);
    }

    /* Forms — denser */
    form label { font-size: 0.88rem; font-weight: 500; }
    form fieldset { padding: 1rem 1.1rem; border-radius: var(--pico-border-radius); border: 1px solid var(--pico-muted-border-color); }
    form fieldset legend { font-size: 0.85rem; font-weight: 600; padding: 0 0.4rem; color: var(--pico-muted-color); }
    form small { color: var(--pico-muted-color); font-size: 0.78rem; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--pico-muted-color);
    }
    .empty-state code {
      background: var(--pico-code-background-color);
      padding: 0.15rem 0.4rem;
      border-radius: 0.25rem;
    }

    /* HTMX row fade-out on swap */
    tr.htmx-swapping {
      opacity: 0;
      transform: translateX(8px);
      transition: opacity 220ms ease, transform 220ms ease;
    }
    /* HTMX request indicator on buttons */
    button.htmx-request, a.htmx-request { opacity: 0.55; pointer-events: none; }
    button.htmx-request::after {
      content: ' ⏳';
    }

    /* Editable schedule cell — hover affordance */
    .schedule-editable { cursor: pointer; transition: background 120ms ease; }
    .schedule-editable:hover {
      background: var(--pico-secondary-background);
      border-radius: var(--pico-border-radius);
      color: var(--pico-color);
    }
    .schedule-editing input { background: var(--pico-form-element-background-color); }

    /* Live log pane */
    .log-section { margin-top: 2.5rem; }
    .log-section summary {
      cursor: pointer;
      padding: 0.4rem 0.6rem;
      border-radius: var(--pico-border-radius);
      font-size: 0.9rem;
      font-weight: 500;
    }
    .log-section summary:hover { background: var(--pico-secondary-background); }
    .log-pane {
      max-height: 360px;
      min-height: 120px;
      overflow-y: auto;
      font-family: var(--pico-font-family-monospace);
      font-size: 0.78rem;
      line-height: 1.4;
      background: var(--pico-code-background-color);
      padding: 0.6rem 0.8rem;
      border-radius: var(--pico-border-radius);
      margin: 0.5rem 0 0.4rem;
      white-space: pre-wrap;
    }
    .log-line { white-space: pre-wrap; word-break: break-word; }
    .log-line.log-warning { color: #f0c674; }
    .log-line.log-error { color: #cc6666; }
    .log-line.log-info { color: var(--pico-color); opacity: 0.85; }
    .log-line.log-debug { color: var(--pico-muted-color); }
    .log-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      font-size: 0.82rem;
      color: var(--pico-muted-color);
    }

    /* Toasts */
    #toast-stack {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 9999;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      min-width: 240px;
      max-width: 380px;
      padding: 0.7rem 0.95rem;
      border-radius: var(--pico-border-radius);
      background: var(--pico-card-background-color);
      box-shadow: 0 6px 24px rgba(0,0,0,.35);
      border-left: 3px solid var(--pico-primary);
      font-size: 0.9rem;
      animation: toast-in 180ms ease-out;
    }
    .toast.toast-error { border-left-color: var(--pico-del-color); }
    .toast.toast-leaving {
      animation: toast-out 220ms ease-in forwards;
    }
    @keyframes toast-in {
      from { transform: translateX(40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes toast-out {
      to { transform: translateX(40px); opacity: 0; }
    }

    /* Chat picker — used in group form for source list (multi) and target (single) */
    .chat-picker {
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: 0.55rem 0.7rem 0.65rem;
      background: var(--pico-card-background-color);
      margin-top: 0.25rem;
    }

    /* Selected chips area — hidden when empty so it doesn't reserve space */
    .chat-picker .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.55rem;
    }
    .chat-picker .chip-list:empty { display: none; }

    .chat-picker .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--pico-secondary-background);
      color: var(--pico-color);
      padding: 0.18rem 0.4rem 0.18rem 0.55rem;
      border-radius: 999px;
      font-size: 0.82rem;
      line-height: 1.2;
      border: 1px solid var(--pico-muted-border-color);
    }
    .chat-picker .chip-icon { opacity: 0.9; }
    .chat-picker .chip-title { font-weight: 500; }
    .chat-picker .chip-username {
      color: var(--pico-muted-color);
      font-family: var(--pico-font-family-monospace);
      font-size: 0.78rem;
    }
    .chat-picker .chip > button {
      all: unset;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.05rem;
      height: 1.05rem;
      border-radius: 999px;
      font-size: 0.7rem;
      color: var(--pico-muted-color);
      transition: background 120ms ease, color 120ms ease;
    }
    .chat-picker .chip > button:hover {
      background: var(--pico-del-color, #cc6666);
      color: #fff;
    }
    .chat-picker .chip > button:focus-visible {
      outline: 2px solid var(--pico-primary);
      outline-offset: 1px;
    }

    /* Tabs row */
    .chat-picker .picker-tabs {
      display: flex;
      align-items: center;
      gap: 0.1rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
      margin: 0 -0.7rem 0.55rem;
      padding: 0 0.55rem;
    }
    .chat-picker .picker-tab {
      all: unset;
      cursor: pointer;
      padding: 0.4rem 0.65rem;
      font-size: 0.85rem;
      color: var(--pico-muted-color);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .chat-picker .picker-tab:hover { color: var(--pico-color); }
    .chat-picker .picker-tab.active {
      color: var(--pico-primary);
      border-bottom-color: var(--pico-primary);
      font-weight: 500;
    }
    .chat-picker .picker-tab:focus-visible {
      outline: 2px solid var(--pico-primary);
      outline-offset: 2px;
      border-radius: 2px;
    }
    .chat-picker .picker-refresh {
      all: unset;
      cursor: pointer;
      margin-left: auto;
      padding: 0.25rem 0.45rem;
      font-size: 0.95rem;
      border-radius: var(--pico-border-radius);
      color: var(--pico-muted-color);
      transition: background 120ms ease, color 120ms ease;
    }
    .chat-picker .picker-refresh:hover {
      background: var(--pico-secondary-background);
      color: var(--pico-color);
    }

    /* Pane visibility */
    .chat-picker .picker-pane.hidden { display: none; }
    .chat-picker .picker-pane[data-pane="link"] {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: stretch;
    }
    .chat-picker .picker-pane[data-pane="link"].hidden { display: none; }

    /* Inputs inside picker — tighter and aligned */
    .chat-picker .picker-search,
    .chat-picker .picker-link-input {
      width: 100%;
      margin-bottom: 0;
      font-size: 0.88rem;
      --pico-form-element-spacing-vertical: 0.45rem;
      --pico-form-element-spacing-horizontal: 0.7rem;
    }
    .chat-picker .picker-link-input { flex: 1; min-width: 14rem; }

    /* Results panel — bordered card with scroll, hidden when no content */
    .chat-picker .picker-results {
      max-height: 280px;
      overflow-y: auto;
      margin-top: 0.45rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: 0.25rem;
      background: var(--pico-background-color);
    }
    .chat-picker .picker-results:empty {
      display: none;
    }

    .chat-picker .picker-result {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.55rem;
      border-radius: 0.3rem;
      cursor: pointer;
      font-size: 0.88rem;
      transition: background 100ms ease;
    }
    .chat-picker .picker-result:hover,
    .chat-picker .picker-result:focus-visible {
      background: var(--pico-secondary-background);
      outline: none;
    }
    .chat-picker .picker-result-icon { opacity: 0.85; flex-shrink: 0; }
    .chat-picker .picker-result-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-picker .picker-result small {
      color: var(--pico-muted-color);
      font-family: var(--pico-font-family-monospace);
      font-size: 0.78rem;
      flex-shrink: 0;
    }

    /* Empty / not-found placeholder inside results */
    .chat-picker .picker-empty {
      padding: 0.55rem 0.6rem;
      color: var(--pico-muted-color);
      font-size: 0.85rem;
      font-style: italic;
    }

    /* Link tab "Add" button — compact */
    .chat-picker .picker-link-add {
      --pico-form-element-spacing-vertical: 0.45rem;
      --pico-form-element-spacing-horizontal: 0.9rem;
      font-size: 0.85rem;
      margin: 0;
      flex-shrink: 0;
    }
    .chat-picker .picker-link-error {
      flex-basis: 100%;
    }
    .chat-picker .picker-link-error small.error {
      color: var(--pico-del-color, #cc6666);
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <nav class="container app-nav">
    <ul>
      <li><a href="/" class="brand">telegram-<span class="dim">news</span></a></li>
    </ul>
    <ul>
      {% set path = request.url.path %}
      <li><a class="nav-link {% if path == '/' or path.startswith('/groups') %}active{% endif %}" href="/">Группы</a></li>
      <li><a class="nav-link {% if path.startswith('/bots') %}active{% endif %}" href="/bots">Боты</a></li>
    </ul>
  </nav>

  <main class="container">
    {% set flash = request.query_params.get('flash') %}
    {% set error = request.query_params.get('error') %}

    {% block content %}{% endblock %}
  </main>

  <div id="toast-stack" aria-live="polite"></div>

  <script>
    function showToast(text, type) {
      const stack = document.getElementById('toast-stack');
      const t = document.createElement('div');
      t.className = 'toast' + (type === 'error' ? ' toast-error' : '');
      t.textContent = text;
      stack.appendChild(t);
      setTimeout(() => {
        t.classList.add('toast-leaving');
        setTimeout(() => t.remove(), 240);
      }, 3200);
    }

    // Server-side toasts: HX-Trigger: {"toast": {"text": "...", "type": "info"}}
    document.body.addEventListener('toast', (ev) => {
      showToast(ev.detail.text, ev.detail.type);
    });

    // HTMX failure → red toast
    document.body.addEventListener('htmx:responseError', (ev) => {
      showToast('Ошибка: ' + (ev.detail.xhr.statusText || ev.detail.xhr.status), 'error');
    });
    document.body.addEventListener('htmx:sendError', () => {
      showToast('Сеть недоступна', 'error');
    });

    // Surface ?flash= / ?error= query params (legacy non-HTMX redirects) once,
    // then strip them from the URL so refresh doesn't re-show.
    (function () {
      const u = new URL(window.location.href);
      const flash = u.searchParams.get('flash');
      const error = u.searchParams.get('error');
      if (flash) showToast(flash, 'info');
      if (error) showToast(error, 'error');
      if (flash || error) {
        u.searchParams.delete('flash');
        u.searchParams.delete('error');
        window.history.replaceState({}, '', u.pathname + (u.search ? u.search : ''));
      }
    })();
  </script>
    <script src="/static/chat_picker.js"></script>
</body>
</html>
