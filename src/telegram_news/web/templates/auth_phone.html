{% extends "base.html" %}
{% block title %}Авторизация · telegram-news{% endblock %}
{% block content %}
<article>
  <header>
    <h2>Вход в Telegram</h2>
    <p>Авторизация под user-аккаунтом для чтения каналов.</p>
  </header>
  <form method="post" action="/auth/send-code">
    <label>
      Номер телефона (с кодом страны, например <code>+79991234567</code>)
      <input type="tel" name="phone" required autofocus placeholder="+...">
    </label>
    <button type="submit">Отправить код</button>
  </form>
</article>
{% endblock %}
