{% extends "base.html" %}
{% block title %}2FA · telegram-news{% endblock %}
{% block content %}
<article>
  <header>
    <h2>Пароль 2FA</h2>
    <p>У аккаунта включена двухфакторная аутентификация.</p>
  </header>
  <form method="post" action="/auth/sign-in">
    <label>
      Пароль 2FA
      <input type="password" name="password" required autofocus>
    </label>
    <button type="submit">Войти</button>
  </form>
</article>
{% endblock %}
